<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Guard - New User Registration</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 0;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 450px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .auth-header h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        input,
        select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .captcha-container {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: 0.5rem;
        }

        .captcha-box {
            background: #e2e8f0;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 700;
            letter-spacing: 4px;
            user-select: none;
            font-style: italic;
            color: #1e293b;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .error-message {
            color: #ef4444;
            background: #fee2e2;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }

        .success-message {
            color: #10b981;
            background: #d1fae5;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }

        .hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">🛡️</div>
            <h1>Create Account</h1>
            <p style="color: var(--text-muted);">Join the Exam Guard Portal</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="registrationForm" onsubmit="handleRegisterSubmit(event)">

            <div class="form-group">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="regPhone">Phone Number</label>
                <input type="tel" id="regPhone" placeholder="+1 (555) 000-0000" required>
                <p class="hint">Used for verification and 2FA.</p>
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Create a strong password" required>
            </div>
            <div class="form-group">
                <label for="regConfirmPassword">Confirm Password</label>
                <input type="password" id="regConfirmPassword" placeholder="Repeat your password" required>
            </div>

            <div class="form-group">
                <label>Security Check</label>
                <div class="captcha-container">
                    <div class="captcha-box" id="regCaptchaBox">1234</div>
                    <input type="text" id="regCaptcha" placeholder="Enter code" required style="flex: 1;">
                </div>
            </div>
            <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="login.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">Already
                have an account? Login</a>
        </div>

        <div style="text-align: center; margin-top: 1rem;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">← Back to
                Home</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize captcha box
        document.getElementById('regCaptchaBox').textContent = "1234";
    </script>
</body>

</html>
